<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servers | SpaceCraft</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
}

/* STAR CANVAS */
#stars {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* TOP BAR */
.topbar {
    display: flex;
    justify-content: flex-end;
    padding: 20px 40px;
}

/* BUTTON */
.button {
    padding: 10px 18px;
    border: 1px solid white;
    border-radius: 8px;
    color: white;
    text-decoration: none;
    transition: 0.25s;
}

.button:hover {
    background: white;
    color: black;
}

/* CENTER TEXT */
.center {
    text-align: center;
    margin-top: 200px;
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
    line-height: 2;
    opacity: 0.9;
    padding: 0 20px;
}

/* FOOTER */
.footer {
    text-align: center;
    margin-top: 120px;
    font-size: 12px;
    opacity: 0.5;
    padding-bottom: 30px;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="topbar">
    <a class="button" href="https://spacecraft.work.gd/">Home</a>
</div>

<div class="center">
If you want to register your server DM me on Discord @judelosaso<br><br>

Disclaimer: I'm not judelow
</div>

<div class="footer">
(copyrightmark) SpaceCraft
</div>

<script>
// STAR ANIMATION
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 140; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5,
        dx: (Math.random() - 0.5) * 0.35,
        dy: (Math.random() - 0.5) * 0.35
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";

    for (let s of stars) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();

        s.x += s.dx;
        s.y += s.dy;

        if (s.x < 0 || s.x > canvas.width) s.dx *= -1;
        if (s.y < 0 || s.y > canvas.height) s.dy *= -1;
    }

    requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
